# =============================================================================
# RLAPP — Pipeline de Escaneo de Seguridad
# =============================================================================
# Ejecuta auditorias de dependencias, escaneo de secretos y analisis
# estatico de seguridad (SAST) en cada PR y push a develop/main.
#
# HUMAN CHECK: Revisar periodicamente los reportes de vulnerabilidades.
#              Configurar SNYK_TOKEN o GITHUB_TOKEN segun la herramienta.
# =============================================================================

name: Security — Dependency Audit & Secret Scan

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    # Ejecutar escaneo semanal los lunes a las 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20"

jobs:
  # ===========================================================================
  # Job 1: Auditoria de dependencias .NET (NuGet)
  # ===========================================================================
  dotnet-audit:
    name: NuGet Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rlapp-backend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependencias
        run: dotnet restore RLAPP.slnx

      - name: Auditar paquetes NuGet (vulnerabilidades conocidas)
        run: |
          echo "=== Auditoria de paquetes NuGet ==="
          dotnet list RLAPP.slnx package --vulnerable --include-transitive 2>&1 | tee nuget-audit.txt

          # Verificar si hay vulnerabilidades criticas o altas
          if grep -iE "(Critical|High)" nuget-audit.txt; then
            echo "::warning::Se detectaron vulnerabilidades criticas o altas en paquetes NuGet."
          fi

      - name: Verificar paquetes deprecados
        run: |
          echo "=== Paquetes NuGet deprecados ==="
          dotnet list RLAPP.slnx package --deprecated 2>&1 | tee nuget-deprecated.txt

      - name: Publicar reporte de auditoria NuGet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-audit-report
          path: |
            rlapp-backend/nuget-audit.txt
            rlapp-backend/nuget-deprecated.txt
          retention-days: 90

  # ===========================================================================
  # Job 2: Auditoria de dependencias npm (frontend)
  # ===========================================================================
  npm-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rlapp-frontend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: rlapp-frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Auditar dependencias npm
        run: |
          echo "=== Auditoria npm ==="
          npm audit --audit-level=moderate 2>&1 | tee npm-audit.txt || true

      - name: Verificar licencias
        run: |
          echo "=== Verificacion de licencias ==="
          npx license-checker --summary 2>&1 | tee npm-licenses.txt || true

      - name: Publicar reporte de auditoria npm
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: |
            rlapp-frontend/npm-audit.txt
            rlapp-frontend/npm-licenses.txt
          retention-days: 90

  # ===========================================================================
  # Job 3: Escaneo de secretos con Gitleaks
  # ===========================================================================
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio (historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Job 4: Analisis estatico de seguridad (SAST) con CodeQL
  # ===========================================================================
  codeql-analysis:
    name: CodeQL SAST Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript

      - name: Configurar .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Compilar backend para analisis
        working-directory: rlapp-backend
        run: |
          dotnet restore RLAPP.slnx
          dotnet build RLAPP.slnx --configuration Release --no-restore

      - name: Ejecutar analisis CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp,javascript"

  # ===========================================================================
  # Job 5: Escaneo de contenedores Docker (Trivy)
  # ===========================================================================
  docker-scan:
    name: Docker Image Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Construir imagen backend
        run: docker build -t rlapp-api:scan -f rlapp-backend/Dockerfile rlapp-backend/

      - name: Escanear imagen con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "rlapp-api:scan"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: "trivy-backend-report.txt"

      - name: Construir imagen frontend
        run: docker build -t rlapp-frontend:scan -f rlapp-frontend/Dockerfile rlapp-frontend/

      - name: Escanear imagen frontend con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "rlapp-frontend:scan"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: "trivy-frontend-report.txt"

      - name: Publicar reportes Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-reports
          path: |
            trivy-backend-report.txt
            trivy-frontend-report.txt
          retention-days: 90

  # ===========================================================================
  # Job 6: Resumen de Seguridad
  # ===========================================================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dotnet-audit, npm-audit, secret-scan, codeql-analysis, docker-scan]
    if: always()

    steps:
      - name: Resumen consolidado de seguridad
        run: |
          echo "=== Resumen de Seguridad ==="
          echo "NuGet Audit:     ${{ needs.dotnet-audit.result }}"
          echo "npm Audit:       ${{ needs.npm-audit.result }}"
          echo "Secret Scan:     ${{ needs.secret-scan.result }}"
          echo "CodeQL SAST:     ${{ needs.codeql-analysis.result }}"
          echo "Docker Scan:     ${{ needs.docker-scan.result }}"
          echo ""

          FAILED=0
          for result in "${{ needs.dotnet-audit.result }}" \
                        "${{ needs.npm-audit.result }}" \
                        "${{ needs.secret-scan.result }}" \
                        "${{ needs.codeql-analysis.result }}" \
                        "${{ needs.docker-scan.result }}"; do
            if [[ "$result" == "failure" ]]; then
              FAILED=$((FAILED + 1))
            fi
          done

          if [[ $FAILED -gt 0 ]]; then
            echo "::warning::$FAILED job(s) de seguridad fallaron. Revisar reportes."
          else
            echo "Todos los escaneos de seguridad completados."
          fi
