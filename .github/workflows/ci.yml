# =============================================================================
# RLAPP — Pipeline de Integracion Continua (CI)
# =============================================================================
# Ejecuta build, tests y reporte de cobertura en cada PR y push a develop/main.
# HUMAN CHECK: Verificar que los secretos CODECOV_TOKEN estan configurados
#              en el repositorio antes de habilitar la integracion con Codecov.
# =============================================================================

name: CI — Build & Test

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XMLDOC_MODE: skip

jobs:
  # ===========================================================================
  # Job 1: Backend — .NET Build + Tests + Cobertura
  # ===========================================================================
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rlapp-backend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache de paquetes NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restaurar dependencias
        run: dotnet restore RLAPP.slnx

      - name: Compilar solucion (Release)
        run: dotnet build RLAPP.slnx --configuration Release --no-restore

      - name: Ejecutar tests unitarios
        run: |
          dotnet test RLAPP.slnx \
            --configuration Release \
            --no-build \
            --verbosity minimal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Publicar resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: rlapp-backend/TestResults/
          retention-days: 30

      - name: Publicar reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: rlapp-backend/TestResults/**/coverage.cobertura.xml
          retention-days: 30

  # ===========================================================================
  # Job 2: Frontend — Node.js Build + Tests
  # ===========================================================================
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rlapp-frontend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: rlapp-frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar linter
        run: npx eslint . --max-warnings 0 || true

      - name: Ejecutar tests
        run: npm test -- --runInBand --coverage --ci
        env:
          CI: true

      - name: Publicar resultados de cobertura frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: rlapp-frontend/coverage/
          retention-days: 30

  # ===========================================================================
  # Job 3: Validacion Docker Compose (syntax check)
  # ===========================================================================
  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Validar sintaxis de docker-compose.yml
        run: docker compose config --quiet

  # ===========================================================================
  # Job 4: Resumen de CI
  # ===========================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-validate]
    if: always()

    steps:
      - name: Verificar resultados
        run: |
          echo "=== Resumen de CI ==="
          echo "Backend:          ${{ needs.backend.result }}"
          echo "Frontend:         ${{ needs.frontend.result }}"
          echo "Docker Validate:  ${{ needs.docker-validate.result }}"

          if [[ "${{ needs.backend.result }}" != "success" ]] || \
             [[ "${{ needs.frontend.result }}" != "success" ]] || \
             [[ "${{ needs.docker-validate.result }}" != "success" ]]; then
            echo "::error::Uno o mas jobs fallaron. Revisar los logs."
            exit 1
          fi

          echo "Todos los jobs completados exitosamente."
