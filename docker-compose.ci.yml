# =============================================================================
# RLAPP CI Environment Overlay
# Lightweight configuration for CI/CD pipelines (GitHub Actions, etc.)
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
# =============================================================================
# HUMAN CHECK: This overlay disables persistent volumes and reduces memory
# limits for ephemeral CI runners. Do NOT use in production.

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Ephemeral, no persistent volume
  # ---------------------------------------------------------------------------
  postgres:
    environment:
      POSTGRES_PASSWORD: ci_test_password
    volumes:
      - ./infrastructure/database/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # RabbitMQ — Ephemeral, no persistent volume
  # ---------------------------------------------------------------------------
  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_PASS: ci_test_password
    volumes:
      - ./infrastructure/messaging/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infrastructure/messaging/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # API — Reduced resources for CI
  # ---------------------------------------------------------------------------
  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Testing
      ConnectionStrings__EventStore: Host=postgres;Port=5432;Database=rlapp_waitingroom;Username=rlapp;Password=ci_test_password;Timeout=30;CommandTimeout=300
      RabbitMq__Password: ci_test_password
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  # ---------------------------------------------------------------------------
  # Worker — Reduced resources for CI
  # ---------------------------------------------------------------------------
  worker:
    environment:
      DOTNET_ENVIRONMENT: Testing
      ConnectionStrings__EventStore: Host=postgres;Port=5432;Database=rlapp_waitingroom;Username=rlapp;Password=ci_test_password;Timeout=30;CommandTimeout=300
      RabbitMq__Password: ci_test_password
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Frontend — Disabled in CI (tests run independently via npm)
  # ---------------------------------------------------------------------------
  frontend:
    profiles:
      - frontend-ci
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Monitoring stack — Disabled in CI via profiles
  # ---------------------------------------------------------------------------
  prometheus:
    profiles:
      - monitoring
  grafana:
    profiles:
      - monitoring
  seq:
    profiles:
      - monitoring
  pgadmin:
    profiles:
      - monitoring
  postgres_exporter:
    profiles:
      - monitoring
